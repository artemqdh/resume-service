version: '3.8'

services:
  api-resume:
    build:
      context: ..
      dockerfile: WebApi/Dockerfile # путь к файлу внутри решения
    ports:
      - "5000:8080" # Внешний порт 5000 -> Внутренний 8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=vacancy_db;Username=igor;Password=password
    depends_on:
      - db-postgres

  db-postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: igor
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vacancy_db
    ports:
      - "5432:5432"
